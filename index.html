<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초록 때리기 (리메이크)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f7f9fc;
            user-select: none;
            position: relative;
        }

        /* 공통 Neomorphic 스타일 */
        .neo-box {
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05), 0 6px 6px rgba(0,0,0,0.05);
            padding: 20px;
        }

        /* 랭킹 섹션 */
        #ranking-section {
            position: absolute;
            top: 20px;
            left: 20px;
            min-width: 280px;
        }
        #ranking-section h3, #ranking-section h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }
        #total-pops-display {
            font-size: 1.8em;
            font-weight: bold;
            color: #4caf50;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #total-pops-display span:first-child { font-size: 0.7em; color: #666; }
        #total-pops-value { line-height: 1; }
        #top-10-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 1em;
            max-height: 300px;
            overflow-y: auto;
        }
        #top-10-list li {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 10px;
            background-color: #f1f3f5;
        }
        #top-10-list .rank-num { font-weight: bold; color: #666; width: 25px; text-align: right; }
        #top-10-list .rank-id { flex-grow: 1; margin-left: 10px; color: #444; }
        #top-10-list .rank-pops { color: #007bff; font-weight: bold; }

        /* 시작 화면 */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        #start-screen h2 { margin-bottom: 20px; color: #333; }
        input[type="text"] {
            padding: 15px;
            font-size: 1.1em;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="text"]:focus {
            border-color: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
            outline: none;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background-color: #4caf50;
            color: white;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover { background-color: #43a047; }
        button:active { transform: scale(0.98); }
        #start-screen p { margin-top: 25px; color: #777; font-size: 0.95em; }

        /* 게임 화면 */
        #game-screen {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        #my-pops-display-wrapper {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #d9534f;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }
        #my-pops-display { line-height: 1; }
        #game-screen p { font-size: 1.3em; margin-bottom: 8px; color: #555; }
        
        #popcat-canvas {
            display: block;
            margin: 0 auto 20px;
            width: 350px; 
            height: auto;
            cursor: pointer;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        #popcat-canvas:active { transform: scale(0.98); }
        .instruction { color:#666; margin-top: 15px; font-size: 1.1em; }
        .instruction strong { color: #333; text-decoration: underline; }

        /* 숫자 애니메이션 스타일 */
        .digit-container {
            position: relative;
            overflow: hidden;
            height: 1.2em;
            display: inline-block;
            vertical-align: top;
            line-height: 1.2;
            margin: 0;
            padding: 0;
            text-align: center;
            width: 0.6em;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .digit-number {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.4s ease-in-out;
            line-height: 1.2;
            white-space: nowrap;
        }
        .digit-number.new { transform: translateY(100%); }
        .digit-number.enter { transform: translateY(0); }
        .digit-number.exit { transform: translateY(-100%); }

        /* 스크롤바 커스터마이징 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f3f5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c1c9d0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a9b0; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
</head>
<body>
    <div id="ranking-section" class="neo-box">
        <h3>🔥 랭킹 현황</h3>
        <div id="total-pops-display">
            <span>전체 클릭</span>
            <div id="total-pops-value" style="display:inline-block;">로딩 중...</div>
        </div>
        <h4>🏆 TOP 10 순위표</h4>
        <ul id="top-10-list"></ul>
    </div>

    <div id="start-screen" class="neo-box" style="width: 400px;">
        <h2>🌿 초록 때리기 🌿</h2>
        <input type="text" id="user-id" placeholder="나만의 멋진 ID를 입력하세요!">
        <button id="start-button">게임 시작!</button>
        <p>* 클릭 횟수는 입력한 ID에 누적됩니다.</p>
    </div>

    <div id="game-screen" class="neo-box">
        <p>내 클릭 수</p>
        <div id="my-pops-display-wrapper">
            <span id="my-pops-display">0</span>
        </div>
        <canvas id="popcat-canvas" width="300" height="300"></canvas> 
        <div class="instruction">당신의 ID: <strong id="current-user-id"></strong></div>
    </div>

    <script>
        // Firebase 설정 (기존 정보)
        const firebaseConfig = {
            apiKey: "AIzaSyA6OwwtJNtTqujb6PW6nolYmstOj7zBqCA",
            authDomain: "drawgreen-3bc38.firebaseapp.com",
            projectId: "drawgreen-3bc38",
            storageBucket: "drawgreen-3bc38.firebasestorage.app",
            messagingSenderId: "1050500469107",
            appId: "1:1050500469107:web:6c25e893e7c12500f23506"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DOM 변수
        const popcatCanvas = document.getElementById('popcat-canvas');
        const ctx = popcatCanvas.getContext('2d');
        const myPopsDisplay = document.getElementById('my-pops-display');
        const totalPopsValue = document.getElementById('total-pops-value');
        const top10List = document.getElementById('top-10-list');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const userIdInput = document.getElementById('user-id');
        const startButton = document.getElementById('start-button');
        const currentUserDisplay = document.getElementById('current-user-id');

        let currentUserId = null;
        let localPops = 0;
        const closedImageSrc = '귀엽다.png'; 
        
        let originalImage = new Image();
        let originalImageData = null;

        // Canvas 이미지 로드 및 초기화
        originalImage.src = closedImageSrc;
        originalImage.onload = () => {
            popcatCanvas.width = originalImage.width;
            popcatCanvas.height = originalImage.height;
            drawOriginalImage();
        };

        function drawOriginalImage() {
            ctx.clearRect(0, 0, popcatCanvas.width, popcatCanvas.height);
            ctx.drawImage(originalImage, 0, 0, popcatCanvas.width, popcatCanvas.height);
            originalImageData = ctx.getImageData(0, 0, popcatCanvas.width, popcatCanvas.height);
        }

        let rankingsInterval = null;
        const POLLING_INTERVAL = 8000;

        // [최적화] 전체 카운터를 별도로 관리 (요금 폭탄 방지)
        async function incrementTotalPops() {
            try {
                await db.collection("global_stats").doc("all_pops").update({
                    total_pops: firebase.firestore.FieldValue.increment(1)
                });
            } catch (err) {
                if (err.code === 'not-found') {
                    await db.collection("global_stats").doc("all_pops").set({ total_pops: 1 });
                } else {
                    console.error("전체 클릭 수 업데이트 실패:", err);
                }
            }
        }

        // ----------------- 게임 시작 -----------------
        startButton.addEventListener('click', startGame);

        async function startGame() {
            const userId = userIdInput.value.trim();
            if (!userId) return alert("ID를 입력해 주세요.");

            currentUserId = userId;
            currentUserDisplay.textContent = currentUserId;
            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            await loadMyPopsInitial();
        }

        async function loadMyPopsInitial() {
            try {
                const doc = await db.collection("users").doc(currentUserId).get();
                localPops = doc.exists ? Number(doc.data().pops) || 0 : 0;
                myPopsDisplay.textContent = localPops;
                myPopsDisplay.dataset.currentValue = localPops; 
            } catch (err) {
                console.error("내 클릭 수 로드 에러:", err);
            }
        }

        // ----------------- 클릭 처리 -----------------
        popcatCanvas.addEventListener('mousedown', handlePop);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat && currentUserId) {
                e.preventDefault();
                const rect = popcatCanvas.getBoundingClientRect();
                // 스페이스바 클릭 시 캔버스 중앙 타겟
                const centerX = popcatCanvas.width / 2;
                const centerY = popcatCanvas.height / 2;
                handlePop({ offsetX: centerX, offsetY: centerY });
            }
        });

        async function handlePop(event) {
            if (!currentUserId || !originalImageData) return;

            localPops++;
            myPopsDisplay.textContent = localPops; 
            myPopsDisplay.dataset.currentValue = localPops; 

            // 왜곡 효과 실행
            applyDisplacementEffect(event.offsetX, event.offsetY);

            // 120ms 후 원상복구
            setTimeout(() => {
                drawOriginalImage();
            }, 120);

            try {
                db.collection("users").doc(currentUserId).set({
                    pops: firebase.firestore.FieldValue.increment(1)
                }, { merge: true });

                incrementTotalPops();
            } catch (err) { console.error("클릭 업데이트 실패:", err); }
        }

        // ----------------- 픽셀 밀어내기 효과 (수정 및 개선 완료) -----------------
        function applyDisplacementEffect(centerX, centerY) {
            const imageData = ctx.createImageData(popcatCanvas.width, popcatCanvas.height);
            const data = imageData.data;
            const originalData = originalImageData.data;
            const width = popcatCanvas.width;
            const height = popcatCanvas.height;

            const effectRadius = 60; // 효과 반경 키움
            const displacementStrength = 25; // 픽셀 밀려나는 강도 키움

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    let targetIndex = (y * width + x) * 4;

                    if (dist < effectRadius) {
                        // 중심에서 바깥으로 밀어내기 위해, 원본 이미지에서 중심과 더 가까운 픽셀을 가져옴
                        const strength = displacementStrength * (1 - dist / effectRadius);
                        const angle = Math.atan2(dy, dx);
                        
                        const srcX = Math.floor(x - Math.cos(angle) * strength);
                        const srcY = Math.floor(y - Math.sin(angle) * strength);

                        const originalPixelIndex = (srcY * width + srcX) * 4;

                        if (originalPixelIndex >= 0 && originalPixelIndex < originalData.length) {
                            data[targetIndex] = originalData[originalPixelIndex];
                            data[targetIndex + 1] = originalData[originalPixelIndex + 1];
                            data[targetIndex + 2] = originalData[originalPixelIndex + 2];
                            data[targetIndex + 3] = originalData[originalPixelIndex + 3];
                        }
                    } else {
                        // 효과 범위 밖은 원본 복사
                        data[targetIndex] = originalData[targetIndex];
                        data[targetIndex + 1] = originalData[targetIndex + 1];
                        data[targetIndex + 2] = originalData[targetIndex + 2];
                        data[targetIndex + 3] = originalData[targetIndex + 3];
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // ----------------- 폴링 제어 -----------------
        function startPolling(interval) {
            if (rankingsInterval) clearInterval(rankingsInterval);
            rankingsInterval = setInterval(async () => {
                await updateRankings();
            }, interval);
        }

        // ----------------- 숫자 애니메이션 -----------------
        function updateNumberSmooth(element, newValue) {
            let oldVal = Number(element.dataset.currentValue || "0");
            if (isNaN(oldVal)) oldVal = 0;
            if (oldVal === newValue) return;

            const oldStr = oldVal.toString();
            const newStr = newValue.toString();
            const maxLen = Math.max(oldStr.length, newStr.length);
            let html = "";

            for (let i = 0; i < maxLen; i++) {
                const oldChar = oldStr[oldStr.length - 1 - i] || " ";
                const newChar = newStr[newStr.length - 1 - i] || " ";
                
                if (oldChar === newChar) {
                    html = `<span class="digit-container"><span class="digit-number">${newChar}</span></span>` + html;
                } else {
                    html = `<span class="digit-container"><span class="digit-number old">${oldChar}</span><span class="digit-number new">${newChar}</span></span>` + html;
                }
            }

            element.innerHTML = html;
            void element.offsetHeight; 

            requestAnimationFrame(() => {
                element.querySelectorAll(".digit-container").forEach(c => {
                    const oldDigit = c.querySelector(".digit-number.old");
                    const newDigit = c.querySelector(".digit-number.new");
                    if (oldDigit) oldDigit.classList.add("exit");
                    if (newDigit) { newDigit.classList.remove("new"); newDigit.classList.add("enter"); }
                });
            });

            setTimeout(() => {
                element.querySelectorAll(".digit-number.old.exit").forEach(e => e.remove());
                element.querySelectorAll(".digit-number.enter").forEach(e => {
                    e.classList.remove("enter");
                    e.className = "digit-number";
                    e.style.transform = "translateY(0)";
                });
                element.textContent = newValue; 
                element.dataset.currentValue = newValue; 
            }, 400); 
        }

        // ----------------- 순위표 -----------------
        function updateRankList(ranks) {
            if (!ranks.length) { top10List.innerHTML = '<li>아직 데이터가 없습니다.</li>'; return; }
            
            const existingRankIds = new Set(Array.from(top10List.children).map(li => li.id));
            const newRankIds = new Set(ranks.map(r => `rank-${r.id}`));
            Array.from(top10List.children).forEach(li => {
                if (!newRankIds.has(li.id)) {
                    li.remove();
                }
            });

            ranks.forEach((r, i) => {
                const listId = `rank-${r.id}`;
                const popSpanId = `rank-pops-${r.id}`;
                let li = document.getElementById(listId);
                let popSpanElement = null;

                if (!li) {
                    li = document.createElement('li'); li.id = listId;
                    const rankNumSpan = document.createElement('span'); rankNumSpan.className = 'rank-num'; 
                    const rankIdSpan = document.createElement('span'); rankIdSpan.className = 'rank-id';
                    const popSpanElementWrap = document.createElement('span'); popSpanElementWrap.className = 'rank-pops';
                    popSpanElement = document.createElement('span'); popSpanElement.id = popSpanId;
                    
                    li.appendChild(rankNumSpan);
                    li.appendChild(rankIdSpan);
                    popSpanElementWrap.appendChild(popSpanElement);
                    li.appendChild(popSpanElementWrap);

                    const existing = Array.from(top10List.children);
                    if (i < existing.length) {
                        top10List.insertBefore(li, existing[i]);
                    } else {
                        top10List.appendChild(li);
                    }
                    popSpanElement.textContent = '0'; 
                    popSpanElement.dataset.currentValue = '0';
                } else {
                    popSpanElement = document.getElementById(popSpanId);
                }

                li.querySelector('.rank-num').textContent = `${i + 1}.`;
                li.querySelector('.rank-id').textContent = r.id; 
                updateNumberSmooth(popSpanElement, r.pops);
            });
        }

        // ----------------- 순위 및 전체 클릭 수 -----------------
        async function updateRankings(initialLoad = false) {
            let totalPops = 0; const ranks = [];
            try {
                // [최적화] 8초마다 모든 유저 문서를 다 불러오지 않고 전역 문서 1개만 읽음
                const totalDoc = await db.collection("global_stats").doc("all_pops").get();
                totalPops = totalDoc.exists ? (Number(totalDoc.data().total_pops) || 0) : 0;

                const snapshot = await db.collection("users").orderBy("pops", "desc").limit(10).get();

                if (initialLoad) {
                    totalPopsValue.textContent = '0';
                    totalPopsValue.dataset.currentValue = '0'; 
                    updateNumberSmooth(totalPopsValue, totalPops);
                } else {
                    updateNumberSmooth(totalPopsValue, totalPops);
                }

                snapshot.docs.forEach(doc => { ranks.push({ id: doc.id, pops: Number(doc.data().pops) || 0 }); });
                updateRankList(ranks);
            } catch (err) {
                console.error("Firestore 오류:", err);
                if (initialLoad) {
                    totalPopsValue.textContent = '0';
                    totalPopsValue.dataset.currentValue = '0'; 
                    updateNumberSmooth(totalPopsValue, 0);
                } else {
                    updateNumberSmooth(totalPopsValue, 0);
                }
                if (!top10List.children.length) top10List.innerHTML = '<li>로딩 오류</li>';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await updateRankings(true);
            startPolling(POLLING_INTERVAL); 
        });
    </script>
</body>
</html>
